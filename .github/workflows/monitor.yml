name: WARN Monitor & Dashboard Update

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black pytest-mock pytest-cov

      - name: Run logic tests
        env:
          PYTHONPATH: .
        run: |
          # Use -v for full details in logs
          pytest -v --cov=.

      - name: 1. Monitor (Scrape)
        run: |
          # We run modules separately for visibility
          python3 warn_monitor.py
      
      - name: 2. Charts (Generate)
        run: |
          # Use --no-png to avoid headless browser issues in CI
          python3 warn_charts.py --no-png
      
      - name: 3. Publish (Build Site)
        run: |
          # Run the publish script but tell it NOT to push itself
          # This allows the GitHub Action to handle the git operations safely
          python3 warn_publish.py --no-push

      - name: 4. Verification Check
        run: |
          echo "Checking generated files..."
          ls -l docs/index.html
          ls -l data/warn_latest.json
          ls -l data/warn_snapshot.json || echo "No snapshot found"

      - name: 5. Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Force add tracked data
          git add data/*.json docs/*.html || true
          
          git commit -m "auto: WARN data update [skip ci]" || echo "No changes to commit"
          git push
