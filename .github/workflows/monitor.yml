name: WARN Monitor & Dashboard Update

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 0. Debug Environment & Setup
        run: |
          echo "Python version:"
          python --version
          echo "Creating directory structure..."
          mkdir -p data/historical/pdfs docs/charts
          echo "Listing current directory:"
          ls -R
          echo "Checking secret availability (masking value)..."
          if [ -z "${{ secrets.GH_REPO_TOKEN }}" ]; then
            echo "::error::GH_REPO_TOKEN is MISSING! Please check your Repository Secrets."
            exit 1
          else
            echo "GH_REPO_TOKEN detected."
          fi

      - name: 1. Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black pytest-mock pytest-cov python-dotenv

      - name: 2. Run logic tests (Allow failure to see results)
        env:
          PYTHONPATH: .
        run: |
          pytest -v --cov=.
        continue-on-error: true

      - name: 3. Monitor (Scrape)
        run: |
          python3 warn_monitor.py
      
      - name: 4. Charts (Generate)
        run: |
          python3 warn_charts.py --no-png
      
      - name: 5. Publish (Build Site)
        run: |
          python3 warn_publish.py --no-push

      - name: 6. Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add data/*.json docs/*.html data/*.jsonl || true
          
          # Only commit if there are actual changes
          if ! git diff --cached --quiet; then
            git commit -m "auto: WARN data update [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
