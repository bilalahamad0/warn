name: WARN Monitor & Dashboard Update

on:
  schedule:
    # Runs at 00:00 and 12:00 UTC every day
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    # Allows manual triggering from the Actions tab

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Core testing and formatting tools
          pip install black pytest-mock pytest-cov python-dotenv

      - name: Run logic tests
        env:
          PYTHONPATH: .
        run: |
          # Ensure directories exist for the structure tests
          mkdir -p data/historical/pdfs docs/charts
          pytest -v --cov=.

      - name: Run WARN Update Pipeline
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GH_REPO_TOKEN: ${{ secrets.GH_REPO_TOKEN }}
        run: |
          # We run the consolidated publish script
          # --no-push allows the Action to handle Git operations safely
          python3 warn_publish.py --no-push

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add all data and docs updates
          git add data/ docs/
          
          # Only commit/push if there are actual data changes
          if ! git diff --cached --quiet; then
            git commit -m "auto: WARN data update [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
