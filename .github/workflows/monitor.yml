name: WARN Monitor & Dashboard Update

on:
  schedule:
    # Runs at 00:00 and 12:00 UTC every day
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    # Allows manual triggering from the Actions tab

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use your custom token for checkout to ensure push permissions
          token: ${{ secrets.GH_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Ensure coverage and mock tools are present
          pip install black pytest-mock pytest-cov

      - name: Run logic tests
        env:
          PYTHONPATH: .
        run: |
          pytest --cov=.

      - name: Run WARN Update Pipeline
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GH_REPO_TOKEN: ${{ secrets.GH_REPO_TOKEN }}
        run: |
          # Use python3 warn_publish.py to run the full pipeline
          python3 warn_publish.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Smart add: only add if they exist to avoid exit code 128
          git add data/ || echo "No data changes"
          git add docs/ || echo "No docs changes"
          
          git commit -m "auto: WARN data update [skip ci]" || echo "No changes to commit"
          git push
